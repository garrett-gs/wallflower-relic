<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallflower Relic — Event Wishlist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f6; color: #111; }

    .container { max-width: 760px; margin: 0 auto; padding: 48px 24px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 15px; margin-bottom: 40px; }

    .section { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 28px; margin-bottom: 24px; }
    .section h2 { font-size: 15px; font-weight: 700; margin-bottom: 20px; color: #333; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-row.full { grid-template-columns: 1fr; }
    label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 5px; }
    input, textarea, select {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: #1e3a5f; box-shadow: 0 0 0 3px rgba(30,58,95,0.08); }
    textarea { min-height: 80px; resize: vertical; }

    /* Inventory grid */
    .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 8px; }
    .inv-card {
      border: 2px solid #e8e8e8; border-radius: 10px; overflow: hidden;
      cursor: pointer; transition: all 0.15s; position: relative; background: #fff;
    }
    .inv-card:hover { border-color: #1e3a5f; }
    .inv-card.selected { border-color: #1e3a5f; background: #f0f4ff; }
    .inv-card img { width: 100%; height: 110px; object-fit: cover; display: block; background: #f0f0f0; }
    .inv-card .no-img { width: 100%; height: 110px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #ccc; }
    .inv-card-info { padding: 8px 10px; }
    .inv-card-name { font-size: 12px; font-weight: 600; line-height: 1.3; }
    .inv-card-price { font-size: 11px; color: #888; margin-top: 2px; }
    .inv-card-check {
      position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
      background: #1e3a5f; border-radius: 50%; display: none; align-items: center;
      justify-content: center; color: #fff; font-size: 12px; font-weight: 700;
    }
    .inv-card.selected .inv-card-check { display: flex; }

    .search-bar { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none; }
    .search-bar:focus { border-color: #1e3a5f; }

    /* Selected items */
    .selected-items { margin-top: 20px; }
    .selected-items h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 10px; }
    .selected-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #f8f8f8; border-radius: 8px; margin-bottom: 6px; }
    .selected-item img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .selected-item .no-img-sm { width: 36px; height: 36px; border-radius: 6px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .selected-item-name { flex: 1; font-size: 13px; font-weight: 600; }
    .selected-item-price { font-size: 12px; color: #888; margin-right: 8px; }
    .qty-input { width: 52px; padding: 4px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; text-align: center; }
    .remove-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; padding: 0 4px; }
    .remove-btn:hover { color: #e74c3c; }

    .submit-btn {
      width: 100%; padding: 14px; background: #1e3a5f; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.15s; letter-spacing: 0.02em;
    }
    .submit-btn:hover { background: #16304f; }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .success-msg { background: #dcfce7; border: 1px solid #bbf7d0; border-radius: 10px; padding: 20px 24px; text-align: center; display: none; }
    .success-msg h3 { color: #15803d; font-size: 18px; margin-bottom: 6px; }
    .success-msg p { color: #166534; font-size: 14px; }

    .error-msg { background: #fee2e2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px 16px; color: #dc2626; font-size: 13px; margin-bottom: 16px; display: none; }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .inventory-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Build Your Wishlist</h1>
  <p class="subtitle">Tell us about your event and pick the items you love — we'll put together a custom quote for you.</p>

  <div id="successMsg" class="success-msg">
    <h3>✓ Wishlist Submitted!</h3>
    <p>We'll review your selections and be in touch shortly with your custom quote.</p>
  </div>

  <form id="wishlistForm">
    <!-- Event Details -->
    <div class="section">
      <h2>Your Event</h2>
      <div class="form-row">
        <div>
          <label>Your Name *</label>
          <input type="text" id="client_name" placeholder="Sarah & James Whitmore" required />
        </div>
        <div>
          <label>Email Address *</label>
          <input type="email" id="client_email" placeholder="sarah@email.com" required />
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Event Type</label>
          <select id="event_type">
            <option value="">Select event type…</option>
            <option>Wedding Reception</option>
            <option>Wedding Ceremony</option>
            <option>Corporate Event</option>
            <option>Birthday Party</option>
            <option>Baby Shower</option>
            <option>Bridal Shower</option>
            <option>Fundraiser / Gala</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label>Event Date</label>
          <input type="date" id="event_date" />
        </div>
      </div>
      <div class="form-row full">
        <div>
          <label>Venue / Location</label>
          <input type="text" id="venue" placeholder="e.g. The Grand Pavilion, Kansas City" />
        </div>
      </div>
      <div class="form-row full">
        <div>
          <label>Notes or Special Requests</label>
          <textarea id="notes" placeholder="Tell us anything helpful — guest count, theme, color palette, budget…"></textarea>
        </div>
      </div>
    </div>

    <!-- Inventory Picker -->
    <div class="section">
      <h2>Pick Your Items</h2>
      <input class="search-bar" type="text" id="invSearch" placeholder="Search items…" oninput="filterInventory()" />
      <div class="inventory-grid" id="inventoryGrid">
        <div style="color:#aaa;font-size:13px;padding:20px 0;">Loading items…</div>
      </div>

      <div class="selected-items" id="selectedItems" style="display:none">
        <h3>Your Selections (<span id="selectedCount">0</span> items)</h3>
        <div id="selectedList"></div>
      </div>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <button type="submit" class="submit-btn" id="submitBtn">Submit My Wishlist →</button>
  </form>
</div>

<script>
  // ─── CONFIGURE THESE ───────────────────────────────────────────────────────
  const SUPABASE_URL    = 'https://mgwvpkezvuswvbkzwysx.supabase.co'
  const SUPABASE_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nd3Zwa2V6dnVzd3Zia3p3eXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxODgyMjksImV4cCI6MjA4ODc2NDIyOX0.Tql9O5el3gr-xusH-icGfQEg0cCHHRUOdyvAq_DHlfs'
  const FUNCTION_URL    = `${SUPABASE_URL}/functions/v1/submit-quote`
  // ───────────────────────────────────────────────────────────────────────────

  let allInventory = []
  let selected = {} // { id: { ...item, qty: 1 } }

  // Load inventory
  async function loadInventory() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/inventory?select=id,name,category,price,image_url&on_website=eq.true&order=name`, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
    })
    allInventory = await res.json()
    renderInventory(allInventory)
  }

  function filterInventory() {
    const q = document.getElementById('invSearch').value.toLowerCase()
    const filtered = allInventory.filter(i => i.name.toLowerCase().includes(q) || (i.category||'').toLowerCase().includes(q))
    renderInventory(filtered)
  }

  function renderInventory(items) {
    const grid = document.getElementById('inventoryGrid')
    if (!items.length) { grid.innerHTML = '<div style="color:#aaa;font-size:13px;padding:20px 0;grid-column:1/-1">No items found</div>'; return }
    grid.innerHTML = items.map(item => `
      <div class="inv-card ${selected[item.id] ? 'selected' : ''}" onclick="toggleItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">
        ${item.image_url ? `<img src="${item.image_url}" alt="${item.name}" />` : '<div class="no-img">◫</div>'}
        <div class="inv-card-info">
          <div class="inv-card-name">${item.name}</div>
          <div class="inv-card-price">${item.price != null ? '$' + Number(item.price).toFixed(2) : ''}</div>
        </div>
        <div class="inv-card-check">✓</div>
      </div>
    `).join('')
  }

  function toggleItem(item) {
    if (selected[item.id]) {
      delete selected[item.id]
    } else {
      selected[item.id] = { ...item, qty: 1 }
    }
    filterInventory()
    renderSelected()
  }

  function updateQty(id, qty) {
    if (selected[id]) selected[id].qty = Math.max(1, parseInt(qty) || 1)
    renderSelected()
  }

  function removeSelected(id) {
    delete selected[id]
    filterInventory()
    renderSelected()
  }

  function renderSelected() {
    const items = Object.values(selected)
    const container = document.getElementById('selectedItems')
    const list = document.getElementById('selectedList')
    document.getElementById('selectedCount').textContent = items.length
    if (!items.length) { container.style.display = 'none'; return }
    container.style.display = 'block'
    list.innerHTML = items.map(item => `
      <div class="selected-item">
        ${item.image_url ? `<img src="${item.image_url}" alt="${item.name}" />` : '<div class="no-img-sm">◫</div>'}
        <span class="selected-item-name">${item.name}</span>
        <span class="selected-item-price">${item.price != null ? '$' + Number(item.price).toFixed(2) : ''}</span>
        <input class="qty-input" type="number" min="1" value="${item.qty}" onchange="updateQty('${item.id}', this.value)" />
        <button class="remove-btn" onclick="removeSelected('${item.id}')" title="Remove">✕</button>
      </div>
    `).join('')
  }

  // Submit form
  document.getElementById('wishlistForm').addEventListener('submit', async (e) => {
    e.preventDefault()
    const btn = document.getElementById('submitBtn')
    const errorMsg = document.getElementById('errorMsg')
    errorMsg.style.display = 'none'
    btn.disabled = true
    btn.textContent = 'Submitting…'

    const payload = {
      client_name:  document.getElementById('client_name').value.trim(),
      client_email: document.getElementById('client_email').value.trim(),
      event_type:   document.getElementById('event_type').value,
      event_date:   document.getElementById('event_date').value || null,
      venue:        document.getElementById('venue').value.trim(),
      notes:        document.getElementById('notes').value.trim(),
      items: Object.values(selected).map(i => ({
        name: i.name, qty: i.qty, price: i.price || 0,
        image_url: i.image_url || '', inventory_id: i.id
      }))
    }

    try {
      const res = await fetch(FUNCTION_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON}` },
        body: JSON.stringify(payload)
      })
      const data = await res.json()
      if (data.success) {
        document.getElementById('wishlistForm').style.display = 'none'
        document.getElementById('successMsg').style.display = 'block'
        window.scrollTo({ top: 0, behavior: 'smooth' })
      } else {
        throw new Error(data.error || 'Submission failed')
      }
    } catch (err) {
      errorMsg.textContent = 'Something went wrong: ' + err.message
      errorMsg.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Submit My Wishlist →'
    }
  })

  loadInventory()
</script>
</body>
</html>
